<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heavy CV with living interface · Dmitry Togulev</title>
  <meta name="description" content="An experiment where the primary input is the camera: your reflection assembled out of particles, browsed with bare hands, right in the browser.">
  <meta property="og:title" content="Heavy CV with living interface · Dmitry Togulev">
  <meta property="og:description" content="An experiment where the primary input is the camera: your reflection assembled out of particles, browsed with bare hands, right in the browser.">
  <!-- ?v=2 busts the scraper proxies: this exact URL served the previous
       frame for days, and fb/tg cache og images by their address -->
  <meta property="og:image" content="https://dimbo-design.github.io/dimbo_heavy-cv/assets/og_img.jpg?v=2">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="689">
  <meta name="generator" content="Claude Code · Fable 5 (Anthropic)">
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <link rel="preload" href="assets/fonts/FixelDisplay-Regular.otf" as="font" type="font/otf" crossorigin>
  <link rel="preload" href="assets/fonts/FixelDisplay-SemiBold.otf" as="font" type="font/otf" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap&subset=cyrillic" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <canvas id="scene"></canvas>
  <div id="vignette"></div>
  <div id="grain"></div>

  <header class="corner tl"><span id="mark">dimbo</span></header>

  <nav class="corner tr" id="lang" aria-label="language">
    <button data-lang="ru">ru</button><i>·</i><button data-lang="en">en</button>
  </nav>

  <main id="stage">

    <!-- invitation: the conscious act of letting the page see -->
    <section id="invite" class="center-block">
      <h1 id="invite-h"></h1>
      <button id="invite-action" class="iris">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <circle class="iris-outer" cx="60" cy="60" r="52"/>
          <circle class="iris-inner" cx="60" cy="60" r="20"/>
        </svg>
        <span id="invite-action-t"></span>
      </button>
      <p class="small" id="invite-s"></p>
      <!-- the hands note: a second-level annotation OUTSIDE the narrative
           flow (owner: the mid-story placement broke the sequence) — set
           apart by a hairline, the one divider this design speaks -->
      <p class="small" id="invite-s2"></p>
    </section>

    <!-- camera denied -->
    <section id="denied" class="center-block hidden">
      <h1 id="denied-h"></h1>
      <p class="small" id="denied-s"></p>
      <div class="mini-links" id="denied-links"></div>
      <button id="denied-action" class="ghost"></button>
    </section>

    <!-- browser can't carry the experience: a considered dead-end -->
    <section id="asleep" class="center-block hidden">
      <h1 id="asleep-h"></h1>
      <p class="small" id="asleep-s"></p>
      <div class="mini-links" id="asleep-links"></div>
      <button id="asleep-action" class="ghost"></button>
    </section>

    <!-- model failed to load -->
    <section id="failed" class="center-block hidden">
      <h1 id="failed-h"></h1>
      <p class="small" id="failed-s"></p>
      <div class="mini-links" id="failed-links"></div>
    </section>

    <!-- identity, revealed on presence -->
    <div id="identity">
      <div id="identity-name"></div>
      <div id="identity-role"></div>
      <!-- mobile only: honest about where the full experience lives -->
      <p id="mobile-note"></p>
    </div>

    <!-- content nodes floating around the silhouette -->
    <div id="nodes" aria-live="polite"></div>

    <!-- content space: the form steps aside, typography takes the light -->
    <section id="space" aria-live="polite">
      <div id="space-scrim"></div>
      <!-- mobile only: chapters read as modal sheets — a fixed bar holds
           the chosen facet's name and the close cross -->
      <div id="space-bar"><span id="space-bar-t"></span></div>
      <div id="space-scroll"><div id="space-inner"></div></div>
      <div id="scroll-hint"><i></i></div>
      <!-- the one proven pattern: an explicit target + dwell, same as opening -->
      <!-- the cross: a capital-letter-sized × beside the title, inward of
           the column (within the hand's reach); label + bar bloom on focus -->
      <button id="space-close" aria-label="close">
        <svg viewBox="0 0 40 40" aria-hidden="true">
          <line x1="8" y1="8" x2="32" y2="32"/>
          <line x1="32" y1="8" x2="8" y2="32"/>
        </svg>
        <span class="n-label" id="space-close-t"></span>
        <i class="n-bar"><i class="n-fill"></i></i>
      </button>
    </section>

    <!-- lightbox: one photo takes the whole stage -->
    <div id="lightbox">
      <figure>
        <img id="lb-img" alt="" draggable="false">
        <figcaption><span id="lb-cap"></span><span id="lb-count"></span></figcaption>
      </figure>
    </div>

  </main>

  <!-- the hand, present in the interface -->
  <div id="cursor" aria-hidden="true">
    <svg viewBox="0 0 48 48">
      <circle class="c-prog" cx="24" cy="24" r="19"/>
      <circle class="c-ring" cx="24" cy="24" r="13"/>
      <circle class="c-dot"  cx="24" cy="24" r="2.6"/>
    </svg>
  </div>

  <!-- gesture hint: a toggle + a terse amber list of what the hands can
       say on this screen (desktop camera mode only) -->
  <div id="ghint" class="hidden">
    <button id="ghint-t"></button>
    <ul id="ghint-l"></ul>
  </div>

  <div class="corner br" id="telemetry"></div>
  <pre id="debug" class="hidden"></pre>

  <!-- mobile dead-end -->
  <section id="mobile" class="hidden">
    <div class="m-inner">
      <h1 id="mobile-h"></h1>
      <p id="mobile-s"></p>
      <div class="m-id">
        <span id="mobile-name"></span>
        <span id="mobile-role"></span>
      </div>
      <div class="mini-links" id="mobile-links"></div>
    </div>
  </section>

  <video id="cam" playsinline muted></video>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
